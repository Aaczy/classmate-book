<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>启动预览</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f7;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            max-width: 500px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #0071e3, #00c7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #86868b;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 16px 32px;
            background: #0071e3;
            color: white;
            text-decoration: none;
            border-radius: 980px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #0077ed;
            transform: scale(1.02);
        }
        .info {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #e5e5e5;
            font-size: 0.9rem;
            color: #86868b;
        }
        code {
            background: #f5f5f7;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ 那个夏天</h1>
        <p>电子同学录预览启动器</p>
        <a href="index.html" class="btn">打开同学录</a>
        <div class="info">
            <p>📁 项目位置：F:\Claude\classmate-book</p>
            <p>💡 双击 <code>index.html</code> 可直接预览</p>
            <p>📖 查看 <code>README.md</code> 了解部署方法</p>
        </div>
    </div>
</body>
</html>
