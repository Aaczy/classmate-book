<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>那个夏天 - 高三X班同学录</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="app.showPage('home')">那个夏天</div>
            <div class="nav-links">
                <button onclick="app.showPage('home')" class="active">首页</button>
                <button onclick="app.showPage('students')">同学录</button>
                <button onclick="app.showPage('messages')">留言墙</button>
                <button onclick="app.showPage('photos')">照片墙</button>
                <button onclick="app.showPage('danmu')">弹幕墙</button>
                <button onclick="app.showPage('capsule')">时间胶囊</button>
            </div>
            <button class="mobile-menu-btn" onclick="app.toggleMobileMenu()">☰</button>
        </div>
    </nav>

    <!-- 移动端导航菜单 -->
    <div class="mobile-menu" id="mobileMenu">
        <button onclick="app.showPage('home')">首页</button>
        <button onclick="app.showPage('students')">同学录</button>
        <button onclick="app.showPage('messages')">留言墙</button>
        <button onclick="app.showPage('photos')">照片墙</button>
        <button onclick="app.showPage('danmu')">弹幕墙</button>
        <button onclick="app.showPage('capsule')">时间胶囊</button>
    </div>

    <!-- 首页 -->
    <div id="home" class="page active">
        <div class="hero">
            <div class="hero-eyebrow" id="classInfo">高三X班 · 2024届</div>
            <h1 class="hero-title" id="siteTitle">那个夏天</h1>
            <p class="hero-subtitle" id="siteSubtitle">我们的青春纪念册</p>

            <div class="hero-image-container">
                <div class="hero-image" id="heroImage">
                    <span>📸 班级合照位置</span>
                </div>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="studentCount">0</div>
                    <div class="stat-label">位同学</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="messageCount">0</div>
                    <div class="stat-label">条留言</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="photoCount">0</div>
                    <div class="stat-label">张照片</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 同学录列表 -->
    <div id="students" class="page">
        <div class="container">
            <div class="section-header">
                <div class="section-eyebrow">Classmate</div>
                <h2 class="section-title">同学录</h2>
            </div>
            <div class="card-grid" id="studentsList">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <!-- 个人主页 -->
    <div id="profile" class="page">
        <div class="profile-hero">
            <div class="profile-avatar" id="profileAvatar">😊</div>
            <h1 class="profile-name" id="profileName">同学姓名</h1>
            <p class="profile-motto" id="profileMotto">「座右铭」</p>
            <div class="profile-tags" id="profileTags">
                <!-- 动态生成 -->
            </div>
        </div>

        <div class="profile-content">
            <div class="info-card" id="profileInfo">
                <!-- 动态生成 -->
            </div>

            <div class="section-header" style="text-align: left; margin-bottom: 32px;">
                <h2 class="section-title" style="font-size: 1.8rem;">同学留言</h2>
            </div>

            <div class="input-card">
                <div class="input-group">
                    <label>给 TA 留言</label>
                    <textarea id="profileMessageInput" placeholder="写下你想对 TA 说的话..."></textarea>
                </div>
                <button class="btn btn-primary" onclick="app.sendProfileMessage()">发布留言</button>
            </div>

            <div id="profileMessages">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <!-- 留言墙 -->
    <div id="messages" class="page">
        <div class="container">
            <div class="section-header">
                <div class="section-eyebrow">Message</div>
                <h2 class="section-title">留言墙</h2>
            </div>

            <div class="input-card">
                <div class="input-group">
                    <label>写下你想说的话</label>
                    <textarea id="messageInput" placeholder="给同学们留下你的祝福吧..."></textarea>
                </div>
                <div style="display: flex; gap: 12px; align-items: center;">
                    <input type="text" id="messageAuthor" placeholder="你的名字" style="width: 150px; padding: 12px 16px; border: 1px solid var(--border); border-radius: 980px; font-size: 0.95rem;">
                    <button class="btn btn-primary" onclick="app.sendMessage()">发布留言</button>
                </div>
            </div>

            <div id="messagesList">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <!-- 照片墙 -->
    <div id="photos" class="page">
        <div class="container">
            <div class="section-header">
                <div class="section-eyebrow">Gallery</div>
                <h2 class="section-title">照片墙</h2>
            </div>

            <div style="text-align: center; margin-bottom: 40px;">
                <input type="file" id="photoInput" accept="image/*" style="display: none;" onchange="app.uploadPhoto()">
                <button class="btn btn-primary" onclick="document.getElementById('photoInput').click()">📸 上传照片</button>
            </div>

            <div class="photo-grid" id="photosList">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <!-- 弹幕墙 -->
    <div id="danmu" class="page danmu-page">
        <div class="danmu-header">
            <div class="section-eyebrow">Danmaku</div>
            <h2 class="section-title">弹幕墙</h2>
            <p class="danmu-hint">💡 毕业聚会时投屏展示，大家一起发弹幕互动！</p>
        </div>

        <div class="danmu-container" id="danmuContainer">
            <div class="danmu-input-area">
                <input type="text" id="danmuInput" placeholder="输入弹幕内容...">
                <button onclick="app.sendDanmu()">发送</button>
            </div>
        </div>
    </div>

    <!-- 时间胶囊 -->
    <div id="capsule" class="page">
        <div class="container">
            <div class="section-header">
                <div class="section-eyebrow">Time Capsule</div>
                <h2 class="section-title">时间胶囊</h2>
                <p style="color: var(--text-secondary); margin-top: 12px;">💌 写一封信给未来的自己，设定日期，到时候才能打开</p>
            </div>

            <div class="capsule-form-card">
                <div class="input-group">
                    <label>写给未来的自己</label>
                    <textarea id="capsuleContent" placeholder="亲爱的未来的我..."></textarea>
                </div>
                <div style="display: flex; gap: 12px; align-items: center; margin-bottom: 20px;">
                    <input type="text" id="capsuleAuthor" placeholder="你的名字" style="width: 150px; padding: 12px 16px; border: 1px solid var(--border); border-radius: 12px; font-size: 0.95rem;">
                    <label style="font-weight: 600;">打开日期：</label>
                    <input type="date" id="capsuleDate" value="2027-06-01">
                </div>
                <button class="btn btn-primary" onclick="app.createCapsule()">💊 封存胶囊</button>
            </div>

            <div class="section-header" style="text-align: left; margin-bottom: 32px;">
                <h2 class="section-title" style="font-size: 1.8rem;">时间胶囊</h2>
            </div>

            <div class="capsule-list" id="capsuleList">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <!-- 加载提示 -->
    <div class="loading-overlay" id="loading" style="display: none;">
        <div class="loading-spinner"></div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
