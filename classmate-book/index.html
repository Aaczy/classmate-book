<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>那个夏天 - 高三14班同学录</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="showPage('home')">那个夏天</div>
            <div class="nav-links">
                <button onclick="showPage('home')" class="active">首页</button>
                <button onclick="showPage('students')">同学录</button>
                <button onclick="showPage('messages')">留言墙</button>
                <button onclick="showPage('photos')">照片墙</button>
                <button onclick="showPage('danmu')">弹幕墙</button>
                <button onclick="showPage('capsule')">时间胶囊</button>
            </div>
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
        </div>
    </nav>

    <!-- 移动端导航菜单 -->
    <div class="mobile-menu" id="mobileMenu">
        <button onclick="showPage('home')">首页</button>
        <button onclick="showPage('students')">同学录</button>
        <button onclick="showPage('messages')">留言墙</button>
        <button onclick="showPage('photos')">照片墙</button>
        <button onclick="showPage('danmu')">弹幕墙</button>
        <button onclick="showPage('capsule')">时间胶囊</button>
    </div>

    <!-- 首页 -->
    <div id="home" class="page active">
        <div class="hero">
            <div class="hero-eyebrow">高三14班 · 2026届</div>
            <h1 class="hero-title">那个夏天</h1>
            <p class="hero-subtitle">我们的青春纪念册</p>

            <div class="hero-image-container">
                <div class="hero-image">
                    <span>📸 班级合照位置</span>
                </div>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="studentCount">0</div>
                    <div class="stat-label">位同学</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="messageCount">0</div>
                    <div class="stat-label">条留言</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="photoCount">0</div>
                    <div class="stat-label">张照片</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 同学录列表 -->
    <div id="students" class="page">
        <div class="container">
            <div class="section-header">
                <div class="section-eyebrow">Classmate</div>
                <h2 class="section-title">同学录</h2>
            </div>
            <div class="card-grid" id="studentsList"></div>
        </div>
    </div>

    <!-- 个人主页 -->
    <div id="profile" class="page">
        <div class="profile-hero">
            <div class="profile-avatar" id="profileAvatar">😊</div>
            <h1 class="profile-name" id="profileName">同学姓名</h1>
            <p class="profile-motto" id="profileMotto">「座右铭」</p>
            <div class="profile-tags" id="profileTags"></div>
        </div>

        <div class="profile-content">
            <div class="info-card" id="profileInfo"></div>

            <div class="section-header" style="text-align: left; margin-bottom: 32px;">
                <h2 class="section-title" style="font-size: 1.8rem;">同学留言</h2>
            </div>

            <div class="input-card">
                <div class="input-group">
                    <label>给 TA 留言</label>
                    <textarea id="profileMessageInput" placeholder="写下你想对 TA 说的话..."></textarea>
                </div>
                <button class="btn btn-primary" onclick="sendProfileMessage()">发布留言</button>
            </div>

            <div id="profileMessages"></div>
        </div>
    </div>

    <!-- 留言墙 -->
    <div id="messages" class="page">
        <div class="container">
            <div class="section-header">
                <div class="section-eyebrow">Message</div>
                <h2 class="section-title">留言墙</h2>
            </div>

            <div class="input-card">
                <div class="input-group">
                    <label>写下你想说的话</label>
                    <textarea id="messageInput" placeholder="给同学们留下你的祝福吧..."></textarea>
                </div>
                <div style="display: flex; gap: 12px; align-items: center;">
                    <input type="text" id="messageAuthor" placeholder="你的名字" style="width: 150px; padding: 12px 16px; border: 1px solid var(--border); border-radius: 980px; font-size: 0.95rem;">
                    <button class="btn btn-primary" onclick="sendMessage()">发布留言</button>
                </div>
            </div>

            <div id="messagesList"></div>
        </div>
    </div>

    <!-- 照片墙 -->
    <div id="photos" class="page">
        <div class="container">
            <div class="section-header">
                <div class="section-eyebrow">Gallery</div>
                <h2 class="section-title">照片墙</h2>
            </div>

            <div style="text-align: center; margin-bottom: 40px;">
                <input type="file" id="photoInput" accept="image/*" style="display: none;" onchange="uploadPhoto()">
                <button class="btn btn-primary" onclick="document.getElementById('photoInput').click()">📸 上传照片</button>
            </div>

            <div class="photo-grid" id="photosList"></div>
        </div>
    </div>

    <!-- 弹幕墙 -->
    <div id="danmu" class="page danmu-page">
        <div class="danmu-header">
            <div class="section-eyebrow">Danmaku</div>
            <h2 class="section-title">弹幕墙</h2>
            <p class="danmu-hint">💡 毕业聚会时投屏展示，大家一起发弹幕互动！</p>
        </div>

        <div class="danmu-container" id="danmuContainer">
            <div class="danmu-input-area">
                <input type="text" id="danmuInput" placeholder="输入弹幕内容...">
                <button onclick="sendDanmu()">发送</button>
            </div>
        </div>
    </div>

    <!-- 时间胶囊 -->
    <div id="capsule" class="page">
        <div class="container">
            <div class="section-header">
                <div class="section-eyebrow">Time Capsule</div>
                <h2 class="section-title">时间胶囊</h2>
                <p style="color: var(--text-secondary); margin-top: 12px;">💌 写一封信给未来的自己，设定日期，到时候才能打开</p>
            </div>

            <div class="capsule-form-card">
                <div class="input-group">
                    <label>写给未来的自己</label>
                    <textarea id="capsuleContent" placeholder="亲爱的未来的我..."></textarea>
                </div>
                <div style="display: flex; gap: 12px; align-items: center; margin-bottom: 20px;">
                    <input type="text" id="capsuleAuthor" placeholder="你的名字" style="width: 150px; padding: 12px 16px; border: 1px solid var(--border); border-radius: 12px; font-size: 0.95rem;">
                    <label style="font-weight: 600;">打开日期：</label>
                    <input type="date" id="capsuleDate" value="2029-06-01">
                </div>
                <button class="btn btn-primary" onclick="createCapsule()">💊 封存胶囊</button>
            </div>

            <div class="section-header" style="text-align: left; margin-bottom: 32px;">
                <h2 class="section-title" style="font-size: 1.8rem;">时间胶囊</h2>
            </div>

            <div class="capsule-list" id="capsuleList"></div>
        </div>
    </div>

    <!-- 加载提示 -->
    <div class="loading-overlay" id="loading" style="display: none;">
        <div class="loading-spinner"></div>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase 配置
        const SUPABASE_URL = 'https://ayuqpqljtbejyihtlinu.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_sKLuEkctFBWP_R9_iw-W1g_ggOlLS7t';

        // 初始化 Supabase
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 当前查看的学生ID
        let currentStudentId = null;

        // 页面切换
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(pageId).classList.add('active');

            document.querySelectorAll('.nav-links button').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('onclick')?.includes(pageId)) {
                    btn.classList.add('active');
                }
            });

            document.getElementById('mobileMenu').classList.remove('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 切换移动菜单
        function toggleMobileMenu() {
            document.getElementById('mobileMenu').classList.toggle('active');
        }

        // 加载学生列表
        async function loadStudents() {
            const { data, error } = await supabaseClient
                .from('students')
                .select('*')
                .order('created_at', { ascending: true });

            if (error) {
                console.error('加载学生失败:', error);
                return;
            }

            document.getElementById('studentCount').textContent = data.length;

            const container = document.getElementById('studentsList');
            container.innerHTML = data.map(student => `
                <div class="card" onclick="showProfile(${student.id})">
                    <div class="card-image">${student.avatar || '😊'}</div>
                    <div class="card-body">
                        <h3 class="card-name">${student.name}</h3>
                        <p class="card-motto">${student.motto || ''}</p>
                    </div>
                </div>
            `).join('');
        }

        // 显示个人主页
        async function showProfile(studentId) {
            currentStudentId = studentId;

            const { data: student, error } = await supabaseClient
                .from('students')
                .select('*')
                .eq('id', studentId)
                .single();

            if (error || !student) {
                alert('找不到该同学');
                return;
            }

            document.getElementById('profileAvatar').textContent = student.avatar || '😊';
            document.getElementById('profileName').textContent = student.name;
            document.getElementById('profileMotto').textContent = `「${student.motto || ''}」`;

            const tags = student.tags ? student.tags.split(',') : [];
            document.getElementById('profileTags').innerHTML = tags.map(tag => `<span class="tag">${tag.trim()}</span>`).join('');

            document.getElementById('profileInfo').innerHTML = `
                <div class="info-item">
                    <div class="info-label">星座</div>
                    <div class="info-value">${student.zodiac || '未填写'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">爱好</div>
                    <div class="info-value">${student.hobbies || '未填写'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">目标大学</div>
                    <div class="info-value">${student.university || '未填写'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">微信</div>
                    <div class="info-value">${student.wechat || '未填写'}</div>
                </div>
            `;

            // 加载个人留言
            const { data: messages } = await supabaseClient
                .from('profile_messages')
                .select('*')
                .eq('student_id', studentId)
                .order('created_at', { ascending: false });

            document.getElementById('profileMessages').innerHTML = (messages || []).map(msg => `
                <div class="message-card">
                    <div class="message-header">
                        <span class="message-author">${msg.author}</span>
                        <span class="message-time">${msg.created_at}</span>
                    </div>
                    <p class="message-content">${msg.content}</p>
                </div>
            `).join('');

            showPage('profile');
        }

        // 发送个人留言
        async function sendProfileMessage() {
            const input = document.getElementById('profileMessageInput');
            const content = input.value.trim();
            if (!content) {
                alert('请输入留言内容');
                return;
            }

            const author = prompt('请输入你的名字：', '匿名同学');
            if (!author) return;

            const { error } = await supabaseClient
                .from('profile_messages')
                .insert([{
                    student_id: currentStudentId,
                    author: author,
                    content: content
                }]);

            if (error) {
                alert('发送失败，请重试');
                return;
            }

            input.value = '';
            showProfile(currentStudentId);
        }

        // 加载留言墙
        async function loadMessages() {
            const { data, error } = await supabaseClient
                .from('messages')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('加载留言失败:', error);
                return;
            }

            document.getElementById('messageCount').textContent = data.length;

            const container = document.getElementById('messagesList');
            container.innerHTML = data.map(msg => `
                <div class="message-card">
                    <div class="message-header">
                        <span class="message-author">${msg.author}</span>
                        <span class="message-time">${formatDateTime(msg.created_at)}</span>
                    </div>
                    <p class="message-content">${msg.content}</p>
                    <div class="message-actions">
                        <button class="action-btn" onclick="likeMessage(${msg.id}, this)">❤️ ${msg.likes || 0}</button>
                        <button class="action-btn">💬 回复</button>
                    </div>
                </div>
            `).join('');
        }

        // 发送留言
        async function sendMessage() {
            const contentInput = document.getElementById('messageInput');
            const authorInput = document.getElementById('messageAuthor');
            const content = contentInput.value.trim();
            const author = authorInput.value.trim() || '匿名同学';

            if (!content) {
                alert('请输入留言内容');
                return;
            }

            const { error } = await supabaseClient
                .from('messages')
                .insert([{
                    author: author,
                    content: content
                }]);

            if (error) {
                alert('发送失败，请重试');
                return;
            }

            contentInput.value = '';
            loadMessages();
        }

        // 点赞
        async function likeMessage(messageId, btn) {
            const { data: current } = await supabaseClient
                .from('messages')
                .select('likes')
                .eq('id', messageId)
                .single();

            const { error } = await supabaseClient
                .from('messages')
                .update({ likes: (current?.likes || 0) + 1 })
                .eq('id', messageId);

            if (!error) {
                btn.textContent = `❤️ ${(current?.likes || 0) + 1}`;
            }
        }

        // 加载照片
        async function loadPhotos() {
            const { data, error } = await supabaseClient
                .from('photos')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('加载照片失败:', error);
                return;
            }

            document.getElementById('photoCount').textContent = data.length;

            const container = document.getElementById('photosList');
            container.innerHTML = data.map(photo => `
                <div class="photo-item">
                    ${photo.url ? `<img src="${photo.url}" alt="照片">` : (photo.emoji || '📷')}
                </div>
            `).join('');
        }

        // 上传照片
        async function uploadPhoto() {
            const input = document.getElementById('photoInput');
            const file = input.files[0];
            if (!file) return;

            if (file.size > 10 * 1024 * 1024) {
                alert('照片大小不能超过 10MB');
                return;
            }

            // 上传到 Supabase Storage
            const fileName = `${Date.now()}_${file.name}`;
            const { data: uploadData, error: uploadError } = await supabaseClient.storage
                .from('photos')
                .upload(fileName, file);

            if (uploadError) {
                alert('上传失败，请重试');
                return;
            }

            // 获取公开链接
            const { data: { publicUrl } } = supabaseClient.storage
                .from('photos')
                .getPublicUrl(fileName);

            // 保存到数据库
            const { error } = await supabaseClient
                .from('photos')
                .insert([{ url: publicUrl, emoji: '' }]);

            if (error) {
                alert('保存失败，请重试');
                return;
            }

            input.value = '';
            loadPhotos();
        }

        // 发送弹幕
        function sendDanmu() {
            const input = document.getElementById('danmuInput');
            const text = input.value.trim();
            if (!text) return;

            const container = document.getElementById('danmuContainer');
            const danmu = document.createElement('div');
            danmu.className = 'danmu-item';
            danmu.style.top = Math.random() * 350 + 40 + 'px';
            danmu.textContent = text;
            container.appendChild(danmu);

            input.value = '';

            setTimeout(() => {
                danmu.remove();
            }, 10000);
        }

        // 加载时间胶囊
        async function loadCapsules() {
            const { data, error } = await supabaseClient
                .from('capsules')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('加载胶囊失败:', error);
                return;
            }

            const container = document.getElementById('capsuleList');
            container.innerHTML = data.map(capsule => {
                const isOpenable = new Date(capsule.open_date) <= new Date();
                const isOpened = capsule.is_opened;

                return `
                    <div class="capsule-card ${!isOpenable && !isOpened ? 'locked' : ''}">
                        <div class="capsule-meta">
                            <span class="capsule-author">${capsule.author}</span>
                            <span class="capsule-date">${capsule.created_at} 封存</span>
                        </div>
                        <p class="capsule-content" style="${!isOpened && !isOpenable ? 'filter: blur(6px); user-select: none;' : ''}">${capsule.content}</p>
                        ${isOpened ?
                            `<p class="capsule-status open">🔓 已打开</p>` :
                            (isOpenable ?
                                `<p class="capsule-status open" onclick="openCapsule(${capsule.id})">🔓 点击打开</p>` :
                                `<p class="capsule-status locked-text">🔒 ${capsule.open_date} 才能打开</p>`
                            )
                        }
                    </div>
                `;
            }).join('');
        }

        // 创建时间胶囊
        async function createCapsule() {
            const contentInput = document.getElementById('capsuleContent');
            const authorInput = document.getElementById('capsuleAuthor');
            const dateInput = document.getElementById('capsuleDate');

            const content = contentInput.value.trim();
            const author = authorInput.value.trim() || '匿名同学';
            const openDate = dateInput.value;

            if (!content) {
                alert('请输入内容');
                return;
            }

            const { error } = await supabaseClient
                .from('capsules')
                .insert([{
                    author: author,
                    content: content,
                    open_date: openDate
                }]);

            if (error) {
                alert('创建失败，请重试');
                return;
            }

            contentInput.value = '';
            loadCapsules();
            alert('💊 时间胶囊已封存！');
        }

        // 打开时间胶囊
        async function openCapsule(capsuleId) {
            if (!confirm('确定要打开这个时间胶囊吗？')) return;

            const { error } = await supabaseClient
                .from('capsules')
                .update({ is_opened: true })
                .eq('id', capsuleId);

            if (!error) {
                loadCapsules();
            }
        }

        // 格式化日期时间
        function formatDateTime(dateStr) {
            const date = new Date(dateStr);
            return `${date.getMonth() + 1}-${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadStudents();
            loadMessages();
            loadPhotos();
            loadCapsules();

            // 回车发送弹幕
            document.getElementById('danmuInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendDanmu();
            });

            console.log('✨ 那个夏天 - 同学录已启动（Supabase 版本）');
        });
    </script>
</body>
</html>
